name: keep-warm

# Pings the app every 5 minutes so the Hugging Face Space never goes idle.
# HF free Spaces only sleep after 48h of inactivity, so a light periodic ping keeps it
# always-on. Repo is PUBLIC → GitHub Actions minutes are unlimited & free.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping the Space
        run: |
          URL="https://palmer2308-fantasy-football.hf.space/"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo 000)
          echo "$(date -u +%H:%M:%S) $URL -> $code"
